name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Package release builds
        run: ./scripts/package_release.sh

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pixel-homestead-release
          path: |
            artifacts/release/*.dmg
            artifacts/release/*.zip
            artifacts/release/SHA256SUMS.txt

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            artifacts/release/*.dmg \
            artifacts/release/*.zip \
            artifacts/release/SHA256SUMS.txt \
            --title "Pixel Homestead ${GITHUB_REF_NAME}" \
            --notes "Self-contained Pixel Homestead builds for macOS and Windows. macOS users can install from the DMG; Windows users should download the win-x64 ZIP and run PixelHomestead.Game.exe inside it."
