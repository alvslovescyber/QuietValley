name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test-format:
    name: Build, Test, Format
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore packages
        run: dotnet restore QuietValley.sln

      - name: CSharpier check
        run: dotnet csharpier check . --ignore-path .csharpierignore --no-msbuild-check

      - name: Build game
        run: dotnet build src/QuietValley.Game/QuietValley.Game.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/QuietValley.SmokeTests/QuietValley.SmokeTests.csproj --configuration Release --no-restore --collect:"XPlat Code Coverage" --logger trx
